<style>
:root{--dark:#0f0f1a;--dark2:#1a1a2e;--bg:#f2f2f7;--card:#fff;--text:#1c1c1e;--muted:#6e6e73;--border:rgba(0,0,0,.09);--r:16px;--rs:10px;}
@media(prefers-color-scheme:dark){:root{--bg:#0f0f1a;--card:#1c1c1e;--text:#f2f2f7;--muted:#8e8e93;--border:rgba(255,255,255,.09);}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);}
.screen{display:none;min-height:100vh;}.screen.active{display:block;}
.home-hdr{background:linear-gradient(150deg,#0f0f1a 0%,#1a1a3e 60%,#0d2060 100%);padding:52px 20px 24px;color:white;}
.home-title{font-size:26px;font-weight:800;letter-spacing:-.5px;}
.home-sub{font-size:13px;opacity:.6;margin-top:3px;}
.stats{display:flex;gap:12px;margin-top:16px;}
.stat{background:rgba(255,255,255,.1);border-radius:10px;padding:8px 14px;}
.sv{font-size:18px;font-weight:700;}.sl{font-size:10px;opacity:.7;margin-top:1px;}
.cities{padding:16px;display:flex;flex-direction:column;gap:10px;}
.cc{background:var(--card);border-radius:var(--r);border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:transform .15s;}
.cc:active{transform:scale(.98);}
.cc-top{display:flex;align-items:center;gap:12px;padding:16px 18px 12px;}
.cc-emoji{font-size:32px;}.cc-name{font-size:18px;font-weight:700;}.cc-dates{font-size:11px;color:var(--muted);margin-top:2px;}
.cc-chips{display:flex;gap:6px;flex-wrap:wrap;padding:0 18px 14px;}
.chip{font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;}
.cf{background:#dbeafe;color:#1d4ed8;}.ct{background:#dcfce7;color:#15803d;}.cb{background:#fef3c7;color:#b45309;}
.ch{background:#ede9fe;color:#6d28d9;}.ca{background:#fee2e2;color:#b91c1c;}.cp{background:#fef3c7;color:#b45309;border:1px dashed #f59e0b;}
.city-hdr{background:linear-gradient(150deg,#0f0f1a,#1a1a3e);padding:52px 20px 22px;color:white;}
.back{background:rgba(255,255,255,.12);border:none;color:white;padding:6px 14px;border-radius:20px;font-size:13px;cursor:pointer;margin-bottom:14px;display:inline-block;}
.cht{font-size:28px;font-weight:800;}.chd{font-size:12px;opacity:.6;margin-top:3px;}
.city-body{padding:14px;display:flex;flex-direction:column;gap:10px;}
.sc{background:var(--card);border-radius:var(--r);border:1px solid var(--border);overflow:hidden;}
.sc-hdr{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;border-bottom:1px solid var(--border);}
.sc-icon{font-size:20px;}.sc-title{font-size:15px;font-weight:700;flex:1;}
.sc-arr{font-size:16px;color:var(--muted);transition:transform .2s;}.sc-arr.open{transform:rotate(90deg);}
.sc-body{padding:14px 16px;}.sc-body.hidden{display:none;}
.tb{display:inline-flex;align-items:center;gap:6px;background:var(--dark2);color:white;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;margin-bottom:12px;flex-wrap:wrap;line-height:1.5;}
.ta{font-size:10px;opacity:.75;}
.ir{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--border);gap:10px;}
.ir:last-child{border-bottom:none;}
.irl{font-size:11px;color:var(--muted);flex:none;width:80px;padding-top:1px;}
.irv{font-size:13px;color:var(--text);font-weight:500;text-align:right;flex:1;line-height:1.5;}
.irv.mono{font-family:monospace;font-size:14px;color:#6d28d9;font-weight:700;letter-spacing:.5px;}
.btn-g{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:12px;}
.btn-g.one{grid-template-columns:1fr;}
.btn{display:flex;align-items:center;justify-content:center;gap:5px;padding:11px 8px;border-radius:var(--rs);border:none;cursor:pointer;font-size:12px;font-weight:600;text-decoration:none;transition:opacity .15s;}
.btn:active{opacity:.7;}
.bd{background:var(--dark2);color:white;}.bb{background:#dbeafe;color:#1d4ed8;}.bp{background:#ede9fe;color:#6d28d9;}
.bg2{background:#dcfce7;color:#15803d;}.bgr{background:var(--bg);color:var(--muted);border:1px solid var(--border);}
.bpend{background:#fef3c7;color:#b45309;border:1.5px dashed #f59e0b;}
.act{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.act:last-child{border-bottom:none;}
.adot{width:7px;height:7px;border-radius:50%;background:#6d28d9;flex:none;margin-top:5px;}
.adot.c{background:#10b981;}
.aname{font-size:13px;font-weight:600;line-height:1.4;}.adet{font-size:11px;color:var(--muted);margin-top:2px;}
.abtns{display:flex;gap:6px;flex-wrap:wrap;margin-top:7px;}
.abtn{font-size:11px;font-weight:600;padding:5px 10px;border-radius:8px;text-decoration:none;border:none;cursor:pointer;}
.nta{width:100%;border:1px solid var(--border);border-radius:var(--rs);padding:10px 12px;font-size:13px;color:var(--text);background:var(--bg);min-height:80px;resize:vertical;font-family:inherit;line-height:1.6;}
.nta:focus{outline:none;border-color:#6d28d9;}
.sbtn{margin-top:8px;padding:10px;background:var(--dark2);color:white;border:none;border-radius:var(--rs);font-size:13px;font-weight:600;cursor:pointer;width:100%;}
.af{display:none;margin-top:10px;}.af.open{display:block;}
.ai{width:100%;border:1px solid var(--border);border-radius:var(--rs);padding:9px 12px;font-size:13px;color:var(--text);background:var(--bg);font-family:inherit;margin-bottom:7px;}
.ai:focus{outline:none;border-color:#6d28d9;}
.ar2{display:flex;gap:8px;}
.as2{flex:1;padding:10px;background:var(--dark2);color:white;border:none;border-radius:var(--rs);font-size:13px;font-weight:600;cursor:pointer;}
.ac2{padding:10px 14px;background:var(--bg);color:var(--muted);border:1px solid var(--border);border-radius:var(--rs);font-size:13px;cursor:pointer;}
.sp{height:30px;}
</style>

function goCity(k){
  const c=C[k];
  document.getElementById('city-title').textContent=c.name;
  document.getElementById('city-dates').textContent=c.dates;
  document.getElementById('city-body').innerHTML=buildCity(k,c);
  document.getElementById('screen-home').classList.remove('active');
  document.getElementById('screen-city').classList.add('active');
  window.scrollTo(0,0);
  const n=localStorage.getItem(c.nk)||'';
  const el=document.getElementById('nta');
  if(el) el.value=n;
  renderCA(k);
}
function goHome(){
  document.getElementById('screen-city').classList.remove('active');
  document.getElementById('screen-home').classList.add('active');
  window.scrollTo(0,0);
}
function buildCity(k,c){
  let h='';
  // TRANSPORT
  const t=c.tr;
  h+=sec('tr-'+k,t.icon,t.lbl,true,
    `<div class="tb">🛫 ${t.dep} <span class="ta"> → ✈ ${t.arr}</span></div>`+
    t.rows.map(r=>`<div class="ir"><div class="irl">${r[0]}</div><div class="irv${r[2]?' mono':''}">${r[1]}</div></div>`).join('')+
    makeBtns(t.btns));
  // HOTEL
  const ho=c.ho;
  h+=sec('ho-'+k,ho.icon,ho.name,true,
    ho.rows.map(r=>`<div class="ir"><div class="irl">${r[0]}</div><div class="irv${r[2]?' mono':''}">${r[1]}</div></div>`).join('')+
    makeBtns(ho.btns));
  // ACTIVITIES
  let actsH=c.acts.map(a=>{
    let ab='';
    if(a.pdf||a.pdf2||a.maps||a.ext){
      ab='<div class="abtns">';
      if(a.pdf) ab+=`<a href="${a.pdf}" target="_blank" class="abtn bb">📄 PDF Tamar</a>`;
      if(a.pdf2) ab+=`<a href="${a.pdf2}" target="_blank" class="abtn bb">📄 PDF Andrés</a>`;
      if(a.maps) ab+=`<a href="${a.maps}" target="_blank" class="abtn bg2">🗺 Maps</a>`;
      if(a.ext) ab+=`<a href="${a.ext}" target="_blank" class="abtn bp">🌐 Ver</a>`;
      ab+='</div>';
    }
    return `<div class="act"><div class="adot"></div><div style="flex:1"><div class="aname">${a.n}</div><div class="adet">${a.d}</div>${ab}</div></div>`;
  }).join('');
  actsH+=`<div id="ca-${k}"></div>
  <button class="btn bgr" style="width:100%;margin-top:10px" onclick="togAdd('${k}')">+ Agregar lugar o actividad</button>
  <div class="af" id="af-${k}">
    <input class="ai" id="ain-${k}" placeholder="Nombre del lugar o actividad">
    <input class="ai" id="aid-${k}" placeholder="Detalle, horario, precio...">
    <div class="ar2"><button class="as2" onclick="saveAct('${k}')">Guardar</button><button class="ac2" onclick="togAdd('${k}')">Cancelar</button></div>
  </div>`;
  h+=sec('ac-'+k,'🎟','Actividades y lugares',true,actsH);
  // NOTES
  h+=sec('no-'+k,'📝','Notas',false,`<textarea class="nta" id="nta" placeholder="Restaurantes, códigos de acceso, tips, contactos..."></textarea><button class="sbtn" onclick="saveN('${k}')">💾 Guardar notas</button>`);
  return h;
}
function sec(id,icon,title,open,body){
  return `<div class="sc">
    <div class="sc-hdr" onclick="tog('${id}',this)"><div class="sc-icon">${icon}</div><div class="sc-title">${title}</div><div class="sc-arr${open?' open':''}" id="arr-${id}">›</div></div>
    <div class="sc-body${open?'':' hidden'}" id="${id}">${body}</div>
  </div>`;
}
function makeBtns(arr){
  if(!arr||!arr.length) return '';
  return `<div class="btn-g${arr.length===1?' one':''}">`+arr.map(b=>`<a href="${b[1]}" target="_blank" class="btn ${b[2]}">${b[0]}</a>`).join('')+'</div>';
}
function tog(id){
  document.getElementById(id).classList.toggle('hidden');
  const a=document.getElementById('arr-'+id);
  if(a) a.classList.toggle('open');
}
function saveN(k){
  localStorage.setItem(C[k].nk,document.getElementById('nta').value);
  const b=event.target; b.textContent='✅ Guardado';
  setTimeout(()=>b.textContent='💾 Guardar notas',1500);
}
function gCA(k){return JSON.parse(localStorage.getItem('ca_'+k)||'[]');}
function sCA(k,a){localStorage.setItem('ca_'+k,JSON.stringify(a));}
function renderCA(k){
  const el=document.getElementById('ca-'+k); if(!el) return;
  el.innerHTML=gCA(k).map((a,i)=>`<div class="act"><div class="adot c"></div><div style="flex:1"><div class="aname">${a.n} <span onclick="delAct('${k}',${i})" style="color:var(--muted);cursor:pointer;font-size:11px">✕</span></div><div class="adet">${a.d}</div></div></div>`).join('');
}
function togAdd(k){document.getElementById('af-'+k).classList.toggle('open');}
function saveAct(k){
  const n=document.getElementById('ain-'+k).value.trim();
  const d=document.getElementById('aid-'+k).value.trim();
  if(!n) return;
  const a=gCA(k); a.push({n,d}); sCA(k,a); renderCA(k);
  document.getElementById('ain-'+k).value='';
  document.getElementById('aid-'+k).value='';
  togAdd(k);
}
function delAct(k,i){const a=gCA(k);a.splice(i,1);sCA(k,a);renderCA(k);}
</script>
